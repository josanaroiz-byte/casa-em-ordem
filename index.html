<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Casa em Ordem</title>
<link rel="icon" type="image/png" href="icone.png"/>
<link rel="apple-touch-icon" href="icone.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Casa em Ordem"/>
<meta name="theme-color" content="#7B4A1E"/>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg:#d4ddd6; --bg2:#c4d0c7; --bg3:#b4c2b7;
    --text:#1a1a1a; --text2:#666660; --text3:#999992;
    --border:rgba(0,0,0,0.12); --border2:rgba(0,0,0,0.2);
    --radius:10px; --radius-lg:14px;
    --green-bg:#EAF3DE; --green-text:#3B6D11;
    --blue-bg:#E6F1FB; --blue-text:#185FA5;
    --amber-bg:#FAEEDA; --amber-text:#854F0B;
    --red-bg:#FCEBEB; --red-text:#A32D2D;
    --teal-bg:#E1F5EE; --teal-text:#0F6E56;
    --gray-bg:#F1EFE8; --gray-text:#5F5E5A;
    --purple-bg:#EEEDFE; --purple-text:#3C3489;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1a; --bg2:#2a2a27; --bg3:#333330;
      --text:#f0efe8; --text2:#aaa99f; --text3:#77776e;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:440px;margin:0 auto;padding-bottom:80px;min-height:100vh}
  h1{font-size:20px;font-weight:500}
  input,select,textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:0.5px solid var(--border2);border-radius:var(--radius);background:#f8f6f0;color:var(--text);width:100%;outline:none;transition:border 0.15s}
  input:focus,select:focus,textarea:focus{border-color:#185FA5}
  textarea{resize:vertical;min-height:60px;line-height:1.5}
  button{font-family:inherit;font-size:13px;padding:9px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;transition:background 0.15s}
  button:hover{background:var(--bg2)}
  button:active{transform:scale(0.98)}
  .btn-primary{background:var(--blue-bg);color:var(--blue-text);border-color:#B5D4F4}
  .btn-danger{background:var(--red-bg);color:var(--red-text);border-color:#F09595}
  .btn-success{background:var(--green-bg);color:var(--green-text);border-color:#C0DD97}
  .badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
  .header{padding:20px 16px 10px;border-bottom:0.5px solid var(--border)}
  .header p{font-size:13px;color:var(--text2);margin-top:2px}
  .nav{display:flex;border-bottom:0.5px solid var(--border);overflow-x:auto}
  .nav button{flex:1;padding:10px 4px;font-size:11px;border:none;border-radius:0;background:transparent;white-space:nowrap;border-bottom:2px solid transparent;color:var(--text2)}
  .nav button.active{font-weight:500;color:var(--text);border-bottom:2px solid var(--text)}
  .content{padding:16px}
  .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .row p{font-size:14px;font-weight:500;color:var(--text2);margin:0}
  .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .metric{background:var(--bg2);border-radius:var(--radius);padding:12px;cursor:pointer}
  .metric .label{font-size:12px;color:var(--text2);margin-bottom:4px}
  .metric .val{font-size:24px;font-weight:500}
  .item{padding:10px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;gap:10px}
  .item-body{flex:1;min-width:0;cursor:pointer}
  .item-name{font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item-sub{font-size:12px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item-badges{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
  .done .item-name{text-decoration:line-through;color:var(--text2)}
  .section-label{font-size:12px;color:var(--text2);margin:16px 0 8px}
  .empty{text-align:center;padding:30px 0;color:var(--text2);font-size:14px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:flex-end}
  .modal{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:20px 16px 36px}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modal-title{font-size:16px;font-weight:500}
  .modal-close{border:none;background:transparent;font-size:22px;cursor:pointer;color:var(--text2);line-height:1;padding:0}
  .field-label{font-size:12px;color:var(--text2);margin:6px 0 5px;font-weight:500}
  .gap{margin-bottom:10px}
  .divider{font-size:12px;color:var(--text2);margin:14px 0 8px;font-weight:500;padding-top:8px;border-top:0.5px solid var(--border)}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;max-width:320px;text-align:center;transition:opacity 0.3s}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--teal-text);flex-shrink:0}
  .detail-row{margin-bottom:10px}
  .detail-row .dl{font-size:11px;color:var(--text2);margin-bottom:2px}
  .detail-row .dv{font-size:14px;color:var(--text)}
  .finance-box{background:var(--green-bg);border-radius:var(--radius);padding:12px;margin-top:12px}
  .finance-box .ft{font-size:12px;font-weight:500;color:var(--green-text);margin-bottom:8px}
  .finance-box p{font-size:13px;color:#27500A;margin-bottom:3px}
  #screen-login{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:32px 24px;text-align:center}
  #screen-login h1{font-size:28px;margin-bottom:8px}
  #screen-login p{color:var(--text2);margin-bottom:32px;font-size:15px}
  #screen-login input{max-width:320px;margin-bottom:12px;font-size:15px}
  #screen-login button{max-width:320px;width:100%;font-size:15px;padding:12px}
</style>
</head>
<body>

<div id="screen-login">
  <div style="font-size:48px;margin-bottom:12px">🏠</div>
  <h1>Casa em Ordem</h1>
  <p>Colocando tudo em ordem!</p>
  <input id="input-nome" type="text" placeholder="Seu nome (ex: Josana)" maxlength="30"/>
  <input id="input-codigo" type="text" placeholder="Código do grupo (ex: familia-roiz)" maxlength="40"/>
  <p style="font-size:11px;color:var(--text3);max-width:320px;margin:-4px 0 12px;text-align:left">Use o mesmo código com quem quiser compartilhar as listas. Códigos diferentes = listas separadas.</p>
  <button class="btn-primary" onclick="entrar()" style="width:100%;max-width:320px">Entrar</button>
</div>

<div id="screen-app" style="display:none">
  <div class="header">
    <h1>🏠 Casa em Ordem</h1>
    <p id="header-sub">Central doméstica</p>
  </div>
  <div class="nav">
    <button class="active" onclick="setAba('dashboard')">Painel</button>
    <button onclick="setAba('tarefas')">Tarefas</button>
    <button onclick="setAba('compras')">Compras</button>
    <button onclick="setAba('manutencoes')">Manutenção</button>
    <button onclick="setAba('prestadores')">Prestadores</button>
    <button onclick="setAba('pagamentos')">Pagamentos</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box"></div>
</div>

<div class="toast" id="toast" style="display:none"></div>

<script>
const SUPABASE_URL  = "https://fyrzywtzaemqdrviizey.supabase.co";
const SUPABASE_ANON = "sb_publishable_L5KPwUUdmFBmHu-cFNsSGQ_s0zqIEoO";
const GCAL_API_KEY  = "AIzaSyDveFc6TOnyikVtHV_ncbqdcd7lqXV8mik";
const GCAL_CLIENT_ID= "510073834567-ossj5sqfbetoj7glofqpmm4raqvduic2.apps.googleusercontent.com";

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let nomeUsuario = "";
let codigoGrupo = "";
let abaAtual = "dashboard";
let dados = { tarefas:[], compras:[], manutencoes:[], prestadores:[], pagamentos:[] };
let pollingInterval = null;

const frequencias    = ["Diária","Semanal","Quinzenal","Mensal","Anual"];
const categorias     = ["Mercado","Limpeza","Farmácia","Higiene","Outros"];
const ambientes      = ["Cozinha","Banheiro","Sala","Quarto","Área externa","Geral"];
const tiposPix       = ["CPF","CNPJ","Telefone","E-mail","Chave aleatória"];
const especialidades = ["Encanador","Eletricista","Pintor","Diarista","Jardineiro","Marceneiro","Pedreiro","Outros"];
const tiposPagamento = ["Conta fixa","Parcela","Avulso"];
const formasPagamento= ["PIX","Cartão de crédito","Cartão de débito","Boleto","Débito automático","Dinheiro"];
const espColor  = { Encanador:"blue",Eletricista:"amber",Pintor:"coral",Diarista:"teal",Jardineiro:"green",Marceneiro:"amber",Pedreiro:"gray",Outros:"gray" };
const freqColor = { Diária:"teal",Semanal:"blue",Quinzenal:"amber",Mensal:"gray",Anual:"red" };
const prioColor = { Alta:"red",Normal:"blue",Baixa:"gray" };

function entrar() {
  const v = document.getElementById("input-nome").value.trim();
  const c = document.getElementById("input-codigo").value.trim().toLowerCase().replace(/\s+/g,"-");
  if (!v) { showToast("Digite seu nome para entrar.", false); return; }
  if (!c) { showToast("Digite um código de grupo.", false); return; }
  nomeUsuario = v;
  codigoGrupo = c;
  localStorage.setItem("ceo_nome", v);
  localStorage.setItem("ceo_codigo", c);
  document.getElementById("screen-login").style.display = "none";
  document.getElementById("screen-app").style.display = "block";
  document.getElementById("header-sub").textContent = "Olá, " + nomeUsuario + " 👋";
  iniciarSync();
}
document.getElementById("input-nome").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("input-codigo").focus(); });
document.getElementById("input-codigo").addEventListener("keydown", e => { if(e.key==="Enter") entrar(); });

// Recuperar sessão salva
window.addEventListener("load", () => {
  const nome = localStorage.getItem("ceo_nome");
  const codigo = localStorage.getItem("ceo_codigo");
  if (nome && codigo) {
    document.getElementById("input-nome").value = nome;
    document.getElementById("input-codigo").value = codigo;
  }
});

async function iniciarSync() {
  await carregarTodos();
  renderAba();
  pollingInterval = setInterval(async () => { await carregarTodos(); renderAba(); }, 10000);
}

async function carregarTodos() {
  const colecoes = ["tarefas","compras","manutencoes","prestadores","pagamentos"];
  for (const col of colecoes) {
    const { data, error } = await sb.from(col).select("*").eq("grupo", codigoGrupo);
    if (!error && data) dados[col] = data.map(row => row.dados || row);
    else dados[col] = [];
  }
}

async function salvarItem(colecao, item) {
  const { error } = await sb.from(colecao).upsert({ id:item.id, grupo:codigoGrupo, dados:item }, { onConflict:"id" });
  if (error) console.error("Erro ao salvar:", error);
  await carregarTodos();
  renderAba();
}

async function removerItem(colecao, id) {
  const { error } = await sb.from(colecao).delete().eq("id", id).eq("grupo", codigoGrupo);
  if (error) console.error("Erro ao remover:", error);
  await carregarTodos();
  renderAba();
}

function setAba(aba) {
  abaAtual = aba;
  document.querySelectorAll(".nav button").forEach((b,i) => {
    b.classList.toggle("active", ["dashboard","tarefas","compras","manutencoes","prestadores","pagamentos"][i] === aba);
  });
  renderAba();
}

function renderAba() {
  const el = document.getElementById("content");
  if      (abaAtual==="dashboard")   el.innerHTML = renderDashboard();
  else if (abaAtual==="tarefas")     el.innerHTML = renderTarefas();
  else if (abaAtual==="compras")     el.innerHTML = renderCompras();
  else if (abaAtual==="manutencoes") el.innerHTML = renderManutencoes();
  else if (abaAtual==="prestadores") el.innerHTML = renderPrestadores();
  else if (abaAtual==="pagamentos")  el.innerHTML = renderPagamentos();
}

function badge(label, color) {
  const c = { green:"var(--green-bg);color:var(--green-text)", blue:"var(--blue-bg);color:var(--blue-text)", amber:"var(--amber-bg);color:var(--amber-text)", red:"var(--red-bg);color:var(--red-text)", teal:"var(--teal-bg);color:var(--teal-text)", gray:"var(--gray-bg);color:var(--gray-text)", purple:"var(--purple-bg);color:var(--purple-text)", coral:"#FAECE7;color:#993C1D" }[color||"gray"] || "var(--gray-bg);color:var(--gray-text)";
  return `<span class="badge" style="background:${c}">${esc(label)}</span>`;
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function showToast(msg, ok=true) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = ok ? "var(--green-bg)" : "var(--red-bg)";
  t.style.color = ok ? "var(--green-text)" : "var(--red-text)";
  t.style.display = "block";
  setTimeout(() => t.style.display="none", 3200);
}
function closeModal(e) { if(e.target===document.getElementById("overlay")) fecharModal(); }
function fecharModal() { document.getElementById("overlay").style.display="none"; }
function abrirModal(html) { document.getElementById("modal-box").innerHTML = html; document.getElementById("overlay").style.display="flex"; }
function sel(opts, val, name) {
  return `<select name="${name}" onchange="window._form['${name}']=this.value">${opts.map(o=>`<option${o===val?" selected":""}>${esc(o)}</option>`).join("")}</select>`;
}

// ── DASHBOARD ──
function renderDashboard() {
  const pT   = dados.tarefas.filter(t=>!t.feita).length;
  const pC   = dados.compras.filter(c=>!c.comprado).length;
  const pM   = dados.manutencoes.filter(m=>!m.feita).length;
  const pP   = dados.prestadores.length;
  const pPag = (dados.pagamentos||[]).filter(p=>!p.pago).length;
  const totalPag = (dados.pagamentos||[]).filter(p=>!p.pago).reduce((a,p)=>a+(parseFloat(p.valor)||0),0);
  const hoje    = dados.tarefas.filter(t=>!t.feita && t.frequencia==="Diária").slice(0,3);
  const urg     = dados.compras.filter(c=>!c.comprado && c.prioridade==="Alta").slice(0,3);
  const vencidas= (dados.pagamentos||[]).filter(p=>!p.pago && p.vencimento && new Date(p.vencimento)<new Date()).slice(0,3);

  let html = `<p style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:12px">Resumo</p>
  <div class="grid2" style="margin-bottom:20px">
    <div class="metric" onclick="setAba('tarefas')"><div class="label">Tarefas pendentes</div><div class="val" style="color:${pT>0?"#D85A30":"#1D9E75"}">${pT}</div></div>
    <div class="metric" onclick="setAba('compras')"><div class="label">Itens para comprar</div><div class="val" style="color:${pC>0?"#BA7517":"#1D9E75"}">${pC}</div></div>
    <div class="metric" onclick="setAba('manutencoes')"><div class="label">Manutenções</div><div class="val" style="color:${pM>0?"#A32D2D":"#1D9E75"}">${pM}</div></div>
    <div class="metric" onclick="setAba('prestadores')"><div class="label">Prestadores</div><div class="val" style="color:#185FA5">${pP}</div></div>
    <div class="metric" onclick="setAba('pagamentos')" style="grid-column:span 2"><div class="label">Contas a pagar</div><div style="display:flex;justify-content:space-between;align-items:center"><div class="val" style="color:${pPag>0?"#A32D2D":"#1D9E75"}">${pPag} conta${pPag!==1?"s":""}</div><div style="font-size:16px;font-weight:500;color:${pPag>0?"#A32D2D":"#1D9E75"}">R$ ${totalPag.toFixed(2)}</div></div></div>
  </div>`;
  if (hoje.length) {
    html += `<p style="font-size:13px;font-weight:500;margin-bottom:8px">Tarefas de hoje</p>`;
    hoje.forEach(t => html += `<div style="font-size:13px;padding:8px 10px;background:var(--bg2);border-radius:var(--radius);margin-bottom:6px">${esc(t.nome)}</div>`);
  }
  if (urg.length) {
    html += `<p style="font-size:13px;font-weight:500;margin:14px 0 8px">Compras urgentes</p>`;
    urg.forEach(c => html += `<div style="font-size:13px;padding:8px 10px;background:var(--red-bg);border-radius:var(--radius);margin-bottom:6px;color:var(--red-text)">${esc(c.nome)}${c.qtd?" — "+esc(c.qtd):""}</div>`);
  }
  if (vencidas.length) {
    html += `<p style="font-size:13px;font-weight:500;margin:14px 0 8px">⚠️ Contas vencidas</p>`;
    vencidas.forEach(p => html += `<div style="font-size:13px;padding:8px 10px;background:var(--red-bg);border-radius:var(--radius);margin-bottom:6px;color:var(--red-text)">${esc(p.nome)} — R$ ${parseFloat(p.valor||0).toFixed(2)}</div>`);
  }
  if (!pT && !pC && !pM && !pPag) html += `<div class="empty">Tudo em dia! 🎉</div>`;
  return html;
}

// ── TAREFAS ──
function renderTarefas() {
  const pend = dados.tarefas.filter(t=>!t.feita);
  const done  = dados.tarefas.filter(t=>t.feita);
  let html = `<div class="row"><p>Tarefas & limpeza</p><button onclick="modalTarefa()">+ Adicionar</button></div>`;
  if (!dados.tarefas.length) html += `<div class="empty">Nenhuma tarefa ainda.</div>`;
  pend.forEach(t => html += itemTarefa(t, false));
  if (done.length) { html += `<p class="section-label">Concluídas</p>`; done.forEach(t => html += itemTarefa(t, true)); }
  return html;
}
function itemTarefa(t, feita) {
  return `<div class="item${feita?" done":""}">
    <input type="checkbox" ${feita?"checked":""} style="width:16px;height:16px;flex-shrink:0;margin-top:3px;cursor:pointer" onchange="toggleTarefa('${t.id}')">
    <div class="item-body" onclick="modalTarefa('${t.id}')">
      <div class="item-name">${esc(t.nome)}</div>
      ${t.observacao?`<div class="item-sub">${esc(t.observacao)}</div>`:""}
      <div class="item-badges">${badge(t.ambiente,"gray")}${badge(t.frequencia,freqColor[t.frequencia]||"gray")}${t.dataLembrete?badge("📅 "+t.dataLembrete,"purple"):""}</div>
    </div>
  </div>`;
}
function toggleTarefa(id) { const t=dados.tarefas.find(x=>x.id===id); if(t) salvarItem("tarefas",{...t,feita:!t.feita}); }
window._form = {};
function modalTarefa(id) {
  const t = id ? dados.tarefas.find(x=>x.id===id) : null;
  window._form = t ? {...t} : { id:uid(),nome:"",ambiente:"Geral",frequencia:"Semanal",observacao:"",dataLembrete:"",horaLembrete:"09:00",feita:false };
  const f = window._form;
  abrirModal(`
    <div class="modal-header"><span class="modal-title">${t?"Editar tarefa":"Nova tarefa"}</span><button class="modal-close" onclick="fecharModal()">✕</button></div>
    <div class="gap"><input placeholder="Nome da tarefa" value="${esc(f.nome)}" oninput="window._form.nome=this.value"></div>
    <div class="grid2 gap">${sel(ambientes,f.ambiente,"ambiente")}${sel(frequencias,f.frequencia,"frequencia")}</div>
    <div class="gap"><textarea placeholder="Observações (opcional)" oninput="window._form.observacao=this.value">${esc(f.observacao||"")}</textarea></div>
    <div class="field-label">Lembrete no Google Calendar</div>
    <div class="grid2 gap">
      <input type="date" value="${esc(f.dataLembrete||"")}" onchange="window._form.dataLembrete=this.value">
      <input type="time" value="${esc(f.horaLembrete||"09:00")}" onchange="window._form.horaLembrete=this.value">
    </div>
    <div class="grid2 gap">
      <button onclick="salvarTarefa()">Salvar</button>
      <button class="btn-primary" onclick="salvarEAgendarTarefa()">Salvar + Agendar 📅</button>
    </div>
    ${t?`<button class="btn-danger" style="width:100%" onclick="removerTarefa('${t.id}')">Excluir tarefa</button>`:""}
  `);
}
function salvarTarefa() { if(!window._form.nome.trim()){showToast("Digite o nome da tarefa.",false);return;} salvarItem("tarefas",window._form); fecharModal(); }
async function salvarEAgendarTarefa() { if(!window._form.nome.trim()){showToast("Digite o nome.",false);return;} if(!window._form.dataLembrete){showToast("Defina uma data de lembrete.",false);return;} salvarItem("tarefas",window._form); fecharModal(); showToast("Salvando e agendando..."); await agendarCalendar("tarefa",window._form); }
function removerTarefa(id) { removerItem("tarefas",id); fecharModal(); }

// ── COMPRAS ──
function renderCompras() {
  const pend = dados.compras.filter(c=>!c.comprado);

  let html = `<div class="row"><p>Lista de compras</p><button onclick="modalCompra()">+ Adicionar</button></div>`;
  if (!dados.compras.length) html += `<div class="empty">Lista vazia.</div>`;
  pend.forEach(c => html += itemCompra(c, false));
  if (done.length) { html += `<p class="section-label">Comprados</p>`; done.forEach(c => html += itemCompra(c, true)); }

}

  </div>`;

function toggleCompra(id) { const c=dados.compras.find(x=>x.id===id); if(c) salvarItem("compras",{...c,comprado:!c.comprado}); }
function modalCompra(id) {

// ── MANUTENÇÕES ──
function renderManutencoes() {
  const pend = dados.manutencoes.filter(m=>!m.feita);
  const done  = dados.manutencoes.filter(m=>m.feita);
  let html = `<div class="row"><p>Manutenção</p><button onclick="modalManutencao()">+ Adicionar</button></div>`;
  if (!dados.manutencoes.length) html += `<div class="empty">Nenhuma manutenção.</div>`;
  pend.forEach(m => {
    const vencida = m.data && new Date(m.data)<new Date() && !m.feita;
    html += `<div class="item" onclick="modalManutencao('${m.id}')">
      <div class="item-body">
        <div class="item-name">${esc(m.nome)}</div>
        ${m.local?`<div class="item-sub">${esc(m.local)}</div>`:""}
        ${m.descricao?`<div class="item-sub">${esc(m.descricao)}</div>`:""}
        <div class="item-badges">
          ${m.data?badge(m.data,vencida?"red":"teal"):""}
          ${vencida?badge("Atrasada","red"):""}
          ${m.dataLembrete?badge("📅 "+m.dataLembrete,"purple"):""}
          <button style="font-size:11px;padding:3px 10px;margin-left:auto" onclick="event.stopPropagation();toggleManutencao('${m.id}')">Concluir</button>
        </div>
      </div>
    </div>`;
  });
  if (done.length) {
    html += `<p class="section-label">Concluídas</p>`;
    done.forEach(m => html += `<div class="item done"><div class="item-body"><div class="item-name">${esc(m.nome)}</div></div><button style="font-size:11px;padding:3px 10px" onclick="toggleManutencao('${m.id}')">Reabrir</button></div>`);
  }
  return html;
}
function toggleManutencao(id) { const m=dados.manutencoes.find(x=>x.id===id); if(m) salvarItem("manutencoes",{...m,feita:!m.feita}); }
function modalManutencao(id) {
  const m = id ? dados.manutencoes.find(x=>x.id===id) : null;
  window._form = m ? {...m} : { id:uid(),nome:"",local:"",descricao:"",data:"",dataLembrete:"",horaLembrete:"09:00",feita:false };

function salvarManutencao() { if(!window._form.nome.trim()){showToast("Digite o nome.",false);return;} salvarItem("manutencoes",window._form); fecharModal(); }

function renderPagamentos() {
  const pend = (dados.pagamentos||[]).filter(p=>!p.pago);

  const total = pend.reduce((a,p)=>a+(parseFloat(p.valor)||0),0);
  let html = `<div class="row"><p>Pagamentos</p><button onclick="modalPagamento()">+ Adicionar</button></div>`;
  if (pend.length) {
    html += `<div style="background:var(--red-bg);border-radius:var(--radius);padding:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--red-text);font-weight:500">${pend.length} conta${pend.length!==1?"s":""} pendente${pend.length!==1?"s":""}</span>
      <span style="font-size:16px;font-weight:500;color:var(--red-text)">R$ ${total.toFixed(2)}</span>
    </div>`;
  }
  if (!(dados.pagamentos||[]).length) html += `<div class="empty">Nenhum pagamento cadastrado.</div>`;
  pend.forEach(p => html += itemPagamento(p, false));
  if (pagos.length) { html += `<p class="section-label">Pagos</p>`; pagos.forEach(p => html += itemPagamento(p, true)); }

}

        <div style="font-size:14px;font-weight:500;color:${pago?"var(--text2)":vencida?"var(--red-text)":"var(--text)"}">R$ ${parseFloat(p.valor||0).toFixed(2)}</div>
      </div>
      ${p.observacao?`<div class="item-sub">${esc(p.observacao)}</div>`:""}

// ── GOOGLE CALENDAR ──
let gisInited = false, gapiInited = false, tokenClient;
function loadGoogleLibs() {
  const s1 = document.createElement("script");
  s1.src = "https://apis.google.com/js/api.js";
  s1.onload = () => gapi.load("client", async () => {
    await gapi.client.init({ apiKey:GCAL_API_KEY, discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"] });
    gapiInited = true;
  });
  document.body.appendChild(s1);
  const s2 = document.createElement("script");
  s2.src = "https://accounts.google.com/gsi/client";
  s2.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({ client_id:GCAL_CLIENT_ID, scope:"https://www.googleapis.com/auth/calendar.events", callback:"" });
    gisInited = true;
  };
  document.body.appendChild(s2);
}
loadGoogleLibs();

async function agendarCalendar(tipo, f) {
  if (!gapiInited || !gisInited) { showToast("Aguardando carregamento do Google...", false); return; }
  return new Promise(resolve => {
    tokenClient.callback = async (resp) => {
      if (resp.error) { showToast("Erro ao autenticar no Google.", false); resolve(); return; }
      try {
        const dt = f.dataLembrete + "T" + (f.horaLembrete||"09:00") + ":00";
        const hh = parseInt((f.horaLembrete||"09:00").split(":")[0]);
        const mm = (f.horaLembrete||"09:00").split(":")[1];
        const endDt = f.dataLembrete + "T" + String(hh+1).padStart(2,"0") + ":" + mm + ":00";
        const emoji = tipo==="tarefa" ? "🏠" : "🔧";
        await gapi.client.calendar.events.insert({
          calendarId:"primary",
          resource:{
            summary: emoji + " " + f.nome,
            description: (f.observacao||f.descricao||"") + (f.ambiente?"\nAmbiente: "+f.ambiente:"") + (f.local?"\nLocal: "+f.local:""),
            start:{ dateTime:dt, timeZone:"America/Sao_Paulo" },
            end:{ dateTime:endDt, timeZone:"America/Sao_Paulo" }
          }
        });
        showToast("Agendado no Google Calendar! 📅");
      } catch(e) { showToast("Erro ao criar evento.", false); }
      resolve();
    };
    if (gapi.client.getToken()===null) tokenClient.requestAccessToken({ prompt:"consent" });
    else tokenClient.requestAccessToken({ prompt:"" });
  });
}
